name: Deploy

on:
  release:
    types:
      - published

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

jobs:
  deploy:
    name: Deploy to Fly.io
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Verify Fly.io configuration
        run: |
          if [ ! -f "fly.toml" ]; then
            echo "Error: fly.toml not found in the repository."
            echo "Please run 'flyctl launch' locally to initialize your Fly.io app,"
            echo "then commit the generated fly.toml (and Dockerfile if required) before deploying."
            exit 1
          fi

      - name: Setup Fly CLI
        uses: superfly/flyctl-actions/setup-flyctl@v1

      - name: Deploy to Fly.io
        run: flyctl deploy --remote-only
