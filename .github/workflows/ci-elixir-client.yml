name: CI Elixir Client

on:
  merge_group:
  pull_request:
    types: [opened, reopened, synchronize]
    paths:
      - 'clients/elixir/**'
  push:
    branches: [main]
    paths:
      - 'clients/elixir/**'
  workflow_dispatch:

concurrency:
  group: ci-elixir-client-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

env:
  MIX_ENV: test
  ELIXIR_VERSION: "1.18"
  OTP_VERSION: "27"

defaults:
  run:
    working-directory: clients/elixir

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ env.ELIXIR_VERSION }}
          otp-version: ${{ env.OTP_VERSION }}

      - uses: actions/cache@v4
        with:
          path: |
            clients/elixir/deps
            clients/elixir/_build
          key: elixir-client-mix-${{ runner.os }}-${{ hashFiles('clients/elixir/mix.lock') }}
          restore-keys: elixir-client-mix-${{ runner.os }}-

      - run: mix deps.get
      - run: mix compile --warnings-as-errors
      - run: mix test
      - run: mix credo --strict
      - run: mix format --check-formatted
