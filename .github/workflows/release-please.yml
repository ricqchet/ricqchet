name: Release Please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest

    # Manifest mode emits per-package outputs keyed by package path
    # (e.g. `ricqchet-web--tag_name`). The legacy single-package outputs
    # (`release_created`, `tag_name`, `version`) are not populated here.
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
      paths_released: ${{ steps.release.outputs.paths_released }}
      web_release_created: ${{ steps.release.outputs['ricqchet-web--release_created'] }}
      web_tag_name: ${{ steps.release.outputs['ricqchet-web--tag_name'] }}
      ts_client_release_created: ${{ steps.release.outputs['ricqchet-ts-client--release_created'] }}
      ts_client_tag_name: ${{ steps.release.outputs['ricqchet-ts-client--tag_name'] }}

    steps:
      - name: Release Please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
