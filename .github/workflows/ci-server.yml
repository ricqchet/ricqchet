name: CI Server

on:
  merge_group:
  pull_request:
    types: [opened, reopened, synchronize]
    paths:
      - 'server/**'
  push:
    branches: [main]
    paths:
      - 'server/**'
  workflow_dispatch:

concurrency:
  group: ci-server-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

env:
  MIX_ENV: test
  ELIXIR_VERSION: "1.18"
  OTP_VERSION: "27"

defaults:
  run:
    working-directory: server

jobs:
  credo:
    name: Credo
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ env.ELIXIR_VERSION }}
          otp-version: ${{ env.OTP_VERSION }}

      - uses: actions/cache@v4
        with:
          path: |
            server/deps
            server/_build
          key: server-mix-${{ runner.os }}-${{ hashFiles('server/mix.lock') }}
          restore-keys: server-mix-${{ runner.os }}-

      - run: mix deps.get
      - run: mix credo --strict

  dependencies:
    name: Dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ env.ELIXIR_VERSION }}
          otp-version: ${{ env.OTP_VERSION }}

      - uses: actions/cache@v4
        with:
          path: |
            server/deps
            server/_build
          key: server-mix-${{ runner.os }}-${{ hashFiles('server/mix.lock') }}
          restore-keys: server-mix-${{ runner.os }}-

      - run: mix deps.get
      - run: mix deps.unlock --check-unused

  dialyzer:
    name: Dialyzer
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: erlef/setup-beam@v1
        id: beam
        with:
          elixir-version: ${{ env.ELIXIR_VERSION }}
          otp-version: ${{ env.OTP_VERSION }}

      - uses: actions/cache@v4
        with:
          path: |
            server/deps
            server/_build
          key: server-mix-${{ runner.os }}-${{ hashFiles('server/mix.lock') }}
          restore-keys: server-mix-${{ runner.os }}-

      - uses: actions/cache@v4
        with:
          path: server/priv/plts
          key: server-plt-${{ runner.os }}-${{ steps.beam.outputs.elixir-version }}-${{ steps.beam.outputs.otp-version }}-${{ hashFiles('server/mix.lock') }}
          restore-keys: server-plt-${{ runner.os }}-${{ steps.beam.outputs.elixir-version }}-${{ steps.beam.outputs.otp-version }}-

      - run: mix deps.get
      - run: mkdir -p priv/plts
      - run: mix dialyzer --format github

  format:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ env.ELIXIR_VERSION }}
          otp-version: ${{ env.OTP_VERSION }}

      - uses: actions/cache@v4
        with:
          path: |
            server/deps
            server/_build
          key: server-mix-${{ runner.os }}-${{ hashFiles('server/mix.lock') }}
          restore-keys: server-mix-${{ runner.os }}-

      - run: mix deps.get
      - run: mix format --check-formatted

  test:
    name: Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ricqchet_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v5

      - uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ env.ELIXIR_VERSION }}
          otp-version: ${{ env.OTP_VERSION }}

      - uses: actions/cache@v4
        with:
          path: |
            server/deps
            server/_build
          key: server-mix-${{ runner.os }}-${{ hashFiles('server/mix.lock') }}
          restore-keys: server-mix-${{ runner.os }}-

      - run: mix deps.get
      - run: mix compile --warnings-as-errors
      - run: mix test
