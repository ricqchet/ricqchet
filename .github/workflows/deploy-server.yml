name: Deploy Server

on:
  release:
    types: [published]

concurrency:
  group: deploy-server-${{ github.ref }}
  cancel-in-progress: false

defaults:
  run:
    working-directory: server

jobs:
  deploy:
    name: Deploy to Fly.io
    if: startsWith(github.event.release.tag_name, 'server-v')
    runs-on: ubuntu-latest
    env:
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
    steps:
      - uses: actions/checkout@v5

      - name: Verify Fly.io configuration
        run: |
          if [ ! -f "fly.toml" ]; then
            echo "Error: fly.toml not found in server directory."
            echo "Please run 'flyctl launch' locally to initialize your Fly.io app,"
            echo "then commit the generated fly.toml (and Dockerfile if required) before deploying."
            exit 1
          fi

      - uses: superfly/flyctl-actions/setup-flyctl@v1

      - run: flyctl deploy --remote-only
